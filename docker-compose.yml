services:
  gemini2api:
    build: .
    container_name: gemini2api
    env_file:
      - .env
    ports:
      - "5918:5918"
    volumes:
      - ./data:/app/data
      - ./api:/app/api
    tmpfs:
      - /tmp
      - /home/appuser/.cache
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:5918/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  refresher:
    build: ./refresher
    container_name: gemini-refresher
    profiles:
      - refresher
    env_file:
      - .env
    environment:
      - GEMINI2API_URL=http://gemini2api:5918
      - REFRESH_INTERVAL_SECONDS=480
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    depends_on:
      gemini2api:
        condition: service_healthy
    restart: unless-stopped
