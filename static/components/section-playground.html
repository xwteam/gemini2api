<link rel="stylesheet" href="components/section-playground.css">
<!-- 模型测试 Section -->
<section id="playground" class="section" aria-labelledby="playground-title">
    <h2 id="playground-title"><i class="fas fa-flask"></i> 模型测试</h2>

    <div class="playground-container">
        <!-- Left Panel: Request Config -->
        <div class="playground-panel">
            <h3>请求配置</h3>
            <div class="form-group">
                <label class="form-label">模型</label>
                <select id="pg-model" class="form-control">
                    <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                    <option value="gemini-2.5-flash-preview-05-20">gemini-2.5-flash-preview-05-20</option>
                    <option value="gemini-2.5-pro-preview-05-06">gemini-2.5-pro-preview-05-06</option>
                    <option value="gemini-2.0-flash-exp">gemini-2.0-flash-exp</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">消息内容</label>
                <textarea id="pg-message" class="form-control" placeholder="输入消息..." rows="10"></textarea>
            </div>
            <div class="flex gap-1">
                <button class="btn btn-primary" id="pg-send">
                    <i class="fas fa-paper-plane"></i> 发送
                </button>
                <button class="btn btn-outline" id="pg-clear-btn">
                    <i class="fas fa-redo-alt"></i> 新对话
                </button>
            </div>
        </div>

        <!-- Right Panel: Chat -->
        <div class="playground-panel chat-panel">
            <h3>对话</h3>
            <div id="pg-chat" class="chat-container">
                <div class="chat-placeholder">
                    <i class="fas fa-comment-dots"></i>
                    <p>发送消息开始对话</p>
                </div>
            </div>
        </div>
    </div>
</section>
