<link rel="stylesheet" href="components/section-logs.css">
<section id="logs" class="section">
    <div class="section-header">
        <h2><i class="fas fa-file-alt"></i> <span data-i18n="logs.title">实时日志</span></h2>
        <div class="log-controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="log-search" data-i18n-placeholder="logs.search" placeholder="搜索日志..." />
            </div>
            <div class="btn-group" id="log-direction">
                <button class="btn btn-sm active" data-value="all" data-i18n="logs.all">全部</button>
                <button class="btn btn-sm" data-value="ingress" data-i18n="logs.ingress">入站</button>
                <button class="btn btn-sm" data-value="egress" data-i18n="logs.egress">出站</button>
            </div>
            <div class="log-actions">
                <button class="btn btn-sm btn-outline" id="log-toggle-btn" title="Pause/Resume">
                    <i class="fas fa-pause"></i>
                </button>
                <button class="btn btn-sm btn-outline" id="log-clear-btn" title="Clear">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="logs-layout">
        <div class="logs-table-wrap">
            <table class="logs-table">
                <thead>
                    <tr>
                        <th data-i18n="logs.time">时间</th>
                        <th data-i18n="logs.direction">方向</th>
                        <th data-i18n="logs.method">方法</th>
                        <th data-i18n="logs.path">路径</th>
                        <th data-i18n="logs.status">状态</th>
                        <th data-i18n="logs.latency">延迟</th>
                        <th data-i18n="logs.model">模型</th>
                    </tr>
                </thead>
                <tbody id="logs-tbody"></tbody>
            </table>
            <div class="logs-empty" id="logs-empty">
                <i class="fas fa-file-alt"></i>
                <p data-i18n="logs.noLogs">暂无日志</p>
            </div>
        </div>
        <div class="logs-detail" id="logs-detail">
            <div class="detail-header">
                <h4 data-i18n="logs.detail">详情</h4>
                <button class="btn btn-sm btn-outline" id="log-detail-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <pre id="log-detail-json"></pre>
        </div>
    </div>

    <div class="logs-pagination">
        <button class="btn btn-sm btn-outline" id="log-prev-btn">
            <i class="fas fa-chevron-left"></i> <span data-i18n="logs.prevPage">上一页</span>
        </button>
        <span id="log-page-info">-</span>
        <button class="btn btn-sm btn-outline" id="log-next-btn">
            <span data-i18n="logs.nextPage">下一页</span> <i class="fas fa-chevron-right"></i>
        </button>
    </div>
</section>
