<!-- Header -->
<link rel="stylesheet" href="components/header.css">
<header class="header">
    <div class="header-content">
        <div class="header-brand">
            <h1><i class="fas fa-robot"></i> <span data-i18n="header.title">Gemini2API</span></h1>
            <span class="header-subtitle" data-i18n="header.subtitle">管理控制台</span>
        </div>
        <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Menu" title="菜单">
            <i class="fas fa-bars"></i>
        </button>
        <div class="header-controls" id="headerControls">
            <span class="status-badge" id="serverStatus">
                <i class="fas fa-circle"></i> <span class="status-text" data-i18n="header.status.running">运行中</span>
            </span>
            <button id="themeToggleBtn" class="theme-toggle" aria-label="Toggle Theme" title="切换主题">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun"></i>
            </button>
            <button id="restartBtn" class="logout-btn restart-btn" data-i18n-title="header.restart" title="重启服务">
                <i class="fas fa-sync-alt"></i> <span data-i18n="header.restart">重启</span>
            </button>
            <button id="logoutBtn" class="logout-btn" data-i18n-title="header.logout" title="登出">
                <i class="fas fa-sign-out-alt"></i> <span data-i18n="header.logout">登出</span>
            </button>
        </div>
    </div>
</header>
