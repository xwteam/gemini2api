<link rel="stylesheet" href="components/section-dashboard.css">
<!-- Dashboard Section -->
<section id="dashboard" class="section active" aria-labelledby="dashboard-title">
    <h2 id="dashboard-title">系统概览</h2>

    <!-- Uptime + QR Section -->
    <div class="dashboard-top-panel">
        <div class="uptime-card">
            <div class="uptime-icon"><i class="fas fa-clock"></i></div>
            <div class="uptime-value" id="uptime-display">0天 0小时 0分 0秒</div>
            <div class="uptime-label">运行时间</div>
        </div>
        <div class="qr-cards">
            <div class="qr-card">
                <img src="img/wechat-qr.png" alt="微信二维码" class="qr-img">
                <p class="qr-title">扫码进群，注明来意</p>
                <p class="qr-desc">添加微信获取更多技术支持和交流</p>
            </div>
            <div class="qr-card">
                <img src="img/sponsor-qr.png" alt="赞助二维码" class="qr-img">
                <p class="qr-title">扫码赞助</p>
                <p class="qr-desc">您的赞助是项目持续发展的动力</p>
            </div>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-users"></i>
            </div>
            <div class="stat-info">
                <h3 id="stat-total">0</h3>
                <p>总账号数</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="stat-info">
                <h3 id="stat-active">0</h3>
                <p>活跃账号</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-chart-line"></i>
            </div>
            <div class="stat-info">
                <h3 id="stat-requests">0</h3>
                <p>总请求数</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-cube"></i>
            </div>
            <div class="stat-info">
                <h3 id="stat-models">0</h3>
                <p>可用模型</p>
            </div>
        </div>
    </div>

    <!-- System Information Panel -->
    <div class="system-info-panel">
        <div class="system-info-header">
            <h3><i class="fas fa-server"></i> 系统信息 <span class="version-badge" id="sys-version">--</span></h3>
        </div>
        <div class="info-grid info-grid-3col">
            <div class="info-item">
                <span class="info-label">
                    <i class="fas fa-code-branch"></i> <span>版本号</span>
                </span>
                <div class="version-display-wrapper">
                    <span class="info-value" id="sys-ver-detail">--</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-label">
                    <i class="fab fa-python"></i> <span>Python版本</span>
                </span>
                <div class="version-display-wrapper">
                    <span class="info-value" id="sys-python">--</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-label">
                    <i class="fas fa-clock"></i> <span>服务器时间</span>
                </span>
                <div class="version-display-wrapper">
                    <span class="info-value" id="sys-time">--</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-label">
                    <i class="fas fa-desktop"></i> <span>操作系统</span>
                </span>
                <div class="version-display-wrapper">
                    <span class="info-value" id="sys-os">--</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-label">
                    <i class="fas fa-memory"></i> <span>内存使用</span>
                </span>
                <div class="version-display-wrapper">
                    <span class="info-value" id="sys-memory">--</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-label">
                    <i class="fas fa-microchip"></i> <span>CPU 使用</span>
                </span>
                <div class="version-display-wrapper">
                    <span class="info-value" id="sys-cpu">--</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-label">
                    <i class="fas fa-play-circle"></i> <span>运行模式</span>
                </span>
                <div class="version-display-wrapper">
                    <span class="info-value" id="sys-mode">--</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-label">
                    <i class="fas fa-fingerprint"></i> <span>进程 PID</span>
                </span>
                <div class="version-display-wrapper">
                    <span class="info-value" id="sys-pid">--</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Config Management Panel -->
    <div class="system-info-panel">
        <div class="system-info-header">
            <h3><i class="fas fa-cogs"></i> 配置管理</h3>
        </div>
        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">
                    <i class="fas fa-sync-alt"></i> <span>轮换策略</span>
                </span>
                <div class="version-display-wrapper">
                    <span class="info-value" id="info-strategy">--</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-label">
                    <i class="fas fa-layer-group"></i> <span>单账号并发上限</span>
                </span>
                <div class="version-display-wrapper">
                    <span class="info-value" id="info-concurrent">--</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-label">
                    <i class="fas fa-users"></i> <span>账号总数</span>
                </span>
                <div class="version-display-wrapper">
                    <span class="info-value" id="info-total-accounts">--</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-label">
                    <i class="fas fa-heartbeat"></i> <span>活跃账号</span>
                </span>
                <div class="version-display-wrapper">
                    <span class="info-value" id="info-active-accounts">--</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Account Status Grid -->
    <div class="provider-status-panel">
        <div class="system-info-header">
            <h3><i class="fas fa-network-wired"></i> <span>账号状态</span></h3>
            <button id="refreshAccountStatusBtn" class="btn btn-outline btn-sm" title="刷新">
                <i class="fas fa-sync-alt"></i> <span>刷新</span>
            </button>
        </div>
        <div id="accountStatusGrid" class="provider-status-grid">
            <div class="status-loading">
                <i class="fas fa-spinner fa-spin"></i>
                <span>加载中...</span>
            </div>
        </div>
    </div>

    <!-- Available Models (Collapsible) -->
    <details class="dashboard-details">
        <summary class="dashboard-summary">
            <div class="summary-content">
                <i class="fas fa-cube"></i>
                <span>可用模型列表</span>
                <span class="expand-hint">展开更多</span>
            </div>
            <i class="fas fa-chevron-down caret-icon"></i>
        </summary>

        <div class="routing-examples-panel" style="margin-top: 1rem; border-top: none;">
            <div class="models-section" style="margin-top: 0;">
                <div class="models-description">
                    <div class="highlight-note">
                        <i class="fas fa-info-circle"></i>
                        <span>点击模型名称可直接复制到剪贴板</span>
                    </div>
                </div>

                <div class="models-container">
                    <div id="modelsList" class="models-list">
                        <div class="models-loading">
                            <i class="fas fa-spinner fa-spin"></i>
                            <span>加载中...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </details>

</section>
